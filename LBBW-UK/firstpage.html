<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Übersicht mit Tabs und Suche</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: #2b2b2b;
      background: #ffffff;
    }

    .page {
      width: 100%;
      margin: 0 auto;
    }

    .tab-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: #e8f0f6;
      margin-top: 40px;
    }

    .tab-button {
      border: none;
      background: #e8f0f6;
      color: #102c45;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .tab-button:hover {
      background: #d7e4ee;
    }

    .tab-button.active {
      background: #0b3355;
      color: #ffffff;
    }

    .tab-panel {
      display: none;
      width: 100%;
    }

    .tab-panel.active {
      display: block;
    }

    .section-title {
      text-align: center;
      font-weight: bold;
      font-size: 22px;
      margin: 14px 0 8px;
    }

    .search-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
    }

    .search-row label {
      font-weight: bold;
      color: #102c45;
    }

    .search-row input {
      width: 320px;
      max-width: 90%;
      padding: 9px 12px;
      border: 1px solid #b8c7d3;
      border-radius: 4px;
      font-size: 15px;
    }

    .search-row input:focus {
      outline: none;
      border-color: #0b3355;
      box-shadow: 0 0 0 2px rgba(11, 51, 85, 0.15);
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    table.data-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.data-table thead {
      background: #0b3355;
      color: #ffffff;
    }

    table.data-table th,
    table.data-table td {
      padding: 12px 16px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    table.data-table th {
      font-weight: bold;
      font-size: 17px;
      cursor: pointer;
      user-select: none;
    }

    table.data-table th:hover {
      background: #14476f;
    }

    table.data-table th .sort-icon {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.85;
    }

    table.data-table tbody tr:nth-child(even) {
      background: #f7f9fb;
    }

    table.data-table tbody tr:hover {
      background: #eef4fa;
    }

    .loading,
    .error,
    .empty {
      text-align: center;
      padding: 20px;
      font-size: 15px;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- Tabs -->
    <div class="tab-bar" role="tablist">
      <button
        class="tab-button active"
        type="button"
        data-tab-target="customerTeamPanel"
      >
        Kundenteam
      </button>

      <button
        class="tab-button"
        type="button"
        data-tab-target="ukServicePanel"
      >
        Offene UK-Service
      </button>

      <button
        class="tab-button"
        type="button"
        data-tab-target="dokumentePanel"
      >
        Dokumente
      </button>

      <button
        class="tab-button"
        type="button"
        data-tab-target="vollmachtPanel"
      >
        Vollmachten
      </button>

      <button
        class="tab-button"
        type="button"
        data-tab-target="contractPanel"
      >
        Vertragsübersicht
      </button>
    </div>

    <!-- Tab 1: Kundenteam -->
    <section id="customerTeamPanel" class="tab-panel active">
      <h2 class="section-title">Kundenteam</h2>

      <div class="search-row">
        <label for="customerNameSearch">Name suchen:</label>
        <input
          id="customerNameSearch"
          type="search"
          placeholder="z.B. Max Muster"
          autocomplete="off"
        />
      </div>

      <div class="table-container">
        <table id="customerTeamTable" class="data-table"></table>
      </div>
    </section>

    <!-- Tab 2: Offene UK-Service -->
    <section id="ukServicePanel" class="tab-panel">
      <h2 class="section-title">Offene UK-Service</h2>

      <div class="search-row">
        <label for="ukServiceSearch">Suche nach Status:</label>
        <input
          id="ukServiceSearch"
          type="search"
          placeholder="z.B. Freistellungsbescheid"
          autocomplete="off"
        />
      </div>

      <div class="table-container">
        <table id="ukServiceTable" class="data-table"></table>
      </div>
    </section>

    <!-- Tab 3: Dokumente -->
    <section id="dokumentePanel" class="tab-panel">
      <h2 class="section-title">Dokumente</h2>

      <div class="search-row">
        <label for="dokumenteSearch">Suche nach Dokument:</label>
        <input
          id="dokumenteSearch"
          type="search"
          placeholder="z.B. Handelsregisterauszug"
          autocomplete="off"
        />
      </div>

      <div class="table-container">
        <table id="dokumenteTable" class="data-table"></table>
      </div>
    </section>

    <!-- Tab 4: Vollmachten -->
    <section id="vollmachtPanel" class="tab-panel">
      <h2 class="section-title">Vollmachten</h2>

      <div class="search-row">
        <label for="vollmachtSearch">Name:</label>
        <input
          id="vollmachtSearch"
          type="search"
          placeholder="z.B. Olaf Müller"
          autocomplete="off"
        />
      </div>

      <div class="table-container">
        <table id="vollmachtTable" class="data-table"></table>
      </div>
    </section>

    <!-- Tab 5: Vertragsübersicht -->
    <section id="contractPanel" class="tab-panel">
      <h2 class="section-title">Vertragsübersicht</h2>

      <div class="table-container">
        <table id="contractTable" class="data-table"></table>
      </div>
    </section>

  </div>

  <script>
    class SortableApiTable {
      constructor(options) {
        this.tableElement = document.querySelector(options.tableSelector);

        if (!this.tableElement) {
          throw new Error("Table element not found: " + options.tableSelector);
        }

        this.apiUrl = options.apiUrl || null;

        this.staticData = Array.isArray(options.staticData)
          ? options.staticData
          : null;

        this.columns = options.columns;
        this.allData = [];
        this.data = [];

        this.sortColumn = null;
        this.sortDirection = "asc";

        this.filterTerm = "";
        this.filterKeys = options.filterKeys || [];

        this.initialized = false;
      }

      async init() {
        if (this.initialized) {
          return;
        }

        this.initialized = true;

        try {
          if (this.staticData) {
            this.allData = this.staticData.map(item => ({ ...item }));
            this.applyFilterAndSort();
            this.render();
            return;
          }

          if (!this.apiUrl) {
            throw new Error("No API URL or static data configured.");
          }

          this.renderMessage("Daten werden geladen...", "loading");

          const response = await fetch(this.apiUrl, {
            method: "GET",
            headers: {
              "Accept": "application/json"
            }
          });

          if (!response.ok) {
            throw new Error(`Backend error: ${response.status} ${response.statusText}`);
          }

          const result = await response.json();

          this.allData = Array.isArray(result) ? result : result.data || [];

          this.applyFilterAndSort();
          this.render();
        } catch (error) {
          this.initialized = false;
          this.renderMessage(
            "Fehler beim Laden der Daten: " + error.message,
            "error"
          );
        }
      }

      setSearchTerm(searchTerm) {
        this.filterTerm = String(searchTerm || "")
          .trim()
          .toLocaleLowerCase("de-DE");

        if (!this.initialized) {
          return;
        }

        this.applyFilterAndSort();
        this.render();
      }

      applyFilterAndSort() {
        let filteredData = [...this.allData];

        if (this.filterTerm && this.filterKeys.length > 0) {
          filteredData = filteredData.filter(item => {
            return this.filterKeys.some(key => {
              const value = this.getValue(item, key);

              return String(value ?? "")
                .toLocaleLowerCase("de-DE")
                .includes(this.filterTerm);
            });
          });
        }

        if (this.sortColumn) {
          const column = this.columns.find(col => col.key === this.sortColumn);

          if (column) {
            const directionMultiplier = this.sortDirection === "asc" ? 1 : -1;

            filteredData.sort((a, b) => {
              const valueA = this.getValue(a, column.key);
              const valueB = this.getValue(b, column.key);

              return this.compareValues(valueA, valueB, column.type) * directionMultiplier;
            });
          }
        }

        this.data = filteredData;
      }

      render() {
        this.tableElement.innerHTML = "";
        this.renderHeader();
        this.renderBody();
      }

      renderHeader() {
        const thead = document.createElement("thead");
        const row = document.createElement("tr");

        this.columns.forEach(column => {
          const th = document.createElement("th");

          const label = document.createElement("span");
          label.textContent = column.label;

          const icon = document.createElement("span");
          icon.className = "sort-icon";

          if (this.sortColumn === column.key) {
            icon.textContent = this.sortDirection === "asc" ? "▲" : "▼";
          } else {
            icon.textContent = "↕";
          }

          th.appendChild(label);
          th.appendChild(icon);

          th.addEventListener("click", () => {
            this.sortByColumn(column);
          });

          row.appendChild(th);
        });

        thead.appendChild(row);
        this.tableElement.appendChild(thead);
      }

      renderBody() {
        const tbody = document.createElement("tbody");

        if (!this.data.length) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");

          cell.className = "empty";
          cell.colSpan = this.columns.length;

          if (this.filterTerm) {
            cell.textContent = "Keine Treffer für die Suche gefunden.";
          } else {
            cell.textContent = "Keine Daten vorhanden.";
          }

          row.appendChild(cell);
          tbody.appendChild(row);
          this.tableElement.appendChild(tbody);
          return;
        }

        this.data.forEach(item => {
          const row = document.createElement("tr");

          this.columns.forEach(column => {
            const td = document.createElement("td");
            const rawValue = this.getValue(item, column.key);

            if (column.formatter) {
              td.textContent = column.formatter(rawValue, item);
            } else {
              td.textContent = rawValue ?? "";
            }

            row.appendChild(td);
          });

          tbody.appendChild(row);
        });

        this.tableElement.appendChild(tbody);
      }

      sortByColumn(column) {
        if (this.sortColumn === column.key) {
          this.sortDirection = this.sortDirection === "asc" ? "desc" : "asc";
        } else {
          this.sortColumn = column.key;
          this.sortDirection = "asc";
        }

        this.applyFilterAndSort();
        this.render();
      }

      compareValues(valueA, valueB, type = "string") {
        if (valueA === null || valueA === undefined) return 1;
        if (valueB === null || valueB === undefined) return -1;

        switch (type) {
          case "number":
            return Number(valueA) - Number(valueB);

          case "date":
            return new Date(valueA) - new Date(valueB);

          case "currency":
            return this.parseNumber(valueA) - this.parseNumber(valueB);

          case "string":
          default:
            return String(valueA).localeCompare(String(valueB), "de", {
              numeric: true,
              sensitivity: "base"
            });
        }
      }

      parseNumber(value) {
        if (typeof value === "number") {
          return value;
        }

        return Number(
          String(value)
            .replace(/\./g, "")
            .replace(",", ".")
            .replace(/[^\d.-]/g, "")
        );
      }

      getValue(object, path) {
        return path.split(".").reduce((current, key) => {
          return current ? current[key] : undefined;
        }, object);
      }

      renderMessage(message, className) {
        this.tableElement.innerHTML = "";

        const tbody = document.createElement("tbody");
        const row = document.createElement("tr");
        const cell = document.createElement("td");

        cell.className = className;
        cell.colSpan = this.columns.length;
        cell.textContent = message;

        row.appendChild(cell);
        tbody.appendChild(row);
        this.tableElement.appendChild(tbody);
      }
    }

    function parseGermanNumber(value) {
      if (typeof value === "number") {
        return value;
      }

      return Number(
        String(value)
          .replace(/\./g, "")
          .replace(",", ".")
          .replace(/[^\d.-]/g, "")
      );
    }

    function formatGermanCurrency(value) {
      if (value === null || value === undefined || value === "") {
        return "";
      }

      const numberValue = parseGermanNumber(value);

      if (!Number.isFinite(numberValue)) {
        return String(value);
      }

      return new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(numberValue);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const hardcodedCustomerTeamData = [
        {
          role: "Kundenmanager",
          name: "Max Muster"
        },
        {
          role: "Vertriebsmanager",
          name: "Maxi Muster"
        },
        {
          role: "Kundenberater",
          name: "Musti Maxer"
        },
        {
          role: "Zahlungsverkehrslösungen",
          name: "Olaf Schmidt"
        }
      ];

      const hardcodedUKServiceData = [
        {
          vorgang: "17.10.25",
          status: "Freistellungsbescheid"
        },
        {
          vorgang: "03.03.25",
          status: "Einzahlerkarte Konto 2047009"
        },
        {
          vorgang: "03.03.26",
          status: "Löschung DA 343,75€ Konto 25358"
        }
      ];

      const hardcodedDokuData = [
        {
          dokument: "KYC Prüfung CORA-X, HR-Auszug aktuell",
          datum: "17.10.26",
          typ: "Handelsregisterauszug"
        }
      ];

      const hardcodedVollmachtData = [
        {
          bevollmaechtigter: "Olaf Müller",
          nummer: "64762134",
          art: "Verfügungsberechtigter für Mietfach 46578741",
          gueltigBis: ""
        },
        {
          bevollmaechtigter: "Markus Maier",
          nummer: "44231774",
          art: "Kontobezogene Vollmacht (A) für Konto DE146764434341014131",
          gueltigBis: ""
        },
        {
          bevollmaechtigter: "Sandra Schmidt",
          nummer: "88146210",
          art: "Kontobezogene Vollmacht (A) für Konto DE146764434341014131",
          gueltigBis: ""
        },
        {
          bevollmaechtigter: "Sydney Swenney",
          nummer: "78945231",
          art: "Kontobezogene Vollmacht (A) für Konto DE146764434341014131",
          gueltigBis: ""
        }
      ];

      const customerTeamTable = new SortableApiTable({
        tableSelector: "#customerTeamTable",
        staticData: hardcodedCustomerTeamData,
        filterKeys: ["name"],
        columns: [
          {
            key: "role",
            label: "Rolle/Team",
            type: "string"
          },
          {
            key: "name",
            label: "Name",
            type: "string"
          }
        ]
      });

      const ukServiceTable = new SortableApiTable({
        tableSelector: "#ukServiceTable",
        staticData: hardcodedUKServiceData,
        filterKeys: ["status"],
        columns: [
          {
            key: "vorgang",
            label: "Vorgang",
            type: "string"
          },
          {
            key: "status",
            label: "Status",
            type: "string"
          }
        ]
      });

      const dokumenteTable = new SortableApiTable({
        tableSelector: "#dokumenteTable",
        staticData: hardcodedDokuData,
        filterKeys: ["dokument", "datum", "typ"],
        columns: [
          {
            key: "dokument",
            label: "Dokument",
            type: "string"
          },
          {
            key: "datum",
            label: "Datum",
            type: "string"
          },
          {
            key: "typ",
            label: "Typ",
            type: "string"
          }
        ]
      });

      const vollmachtTable = new SortableApiTable({
        tableSelector: "#vollmachtTable",
        staticData: hardcodedVollmachtData,
        filterKeys: ["bevollmaechtigter"],
        columns: [
          {
            key: "bevollmaechtigter",
            label: "Bevollmächtigter",
            type: "string"
          },
          {
            key: "nummer",
            label: "Nummer",
            type: "string"
          },
          {
            key: "art",
            label: "Art",
            type: "string"
          },
          {
            key: "gueltigBis",
            label: "Gültig bis",
            type: "string"
          }
        ]
      });

      const contractTable = new SortableApiTable({
        tableSelector: "#contractTable",
        apiUrl: "https://6724f040c39fedae05b35190.mockapi.io/api/AnnaG/contracts",
        columns: [
          {
            key: "Vertrag",
            label: "Vertrag",
            type: "string"
          },
          {
            key: "name",
            label: "Name",
            type: "string"
          },
          {
            key: "Produkt",
            label: "Produkt",
            type: "string"
          },
          {
            key: "Status",
            label: "Status",
            type: "string"
          },
          {
            key: "IBAN",
            label: "Konto/IBAN",
            type: "string"
          },
          {
            key: "Saldo",
            label: "Saldo",
            type: "currency",
            formatter: formatGermanCurrency
          },
          {
            key: "VerfuegbarerBetrag",
            label: "Verfügbarer Betrag",
            type: "currency",
            formatter: formatGermanCurrency
          }
        ]
      });

      const tablesByPanel = {
        customerTeamPanel: customerTeamTable,
        ukServicePanel: ukServiceTable,
        dokumentePanel: dokumenteTable,
        vollmachtPanel: vollmachtTable,
        contractPanel: contractTable
      };

      function activateTab(panelId) {
        const tabButtons = document.querySelectorAll(".tab-button");
        const tabPanels = document.querySelectorAll(".tab-panel");

        tabButtons.forEach(button => {
          const isActive = button.dataset.tabTarget === panelId;
          button.classList.toggle("active", isActive);
        });

        tabPanels.forEach(panel => {
          const isActive = panel.id === panelId;
          panel.classList.toggle("active", isActive);
        });

        const table = tablesByPanel[panelId];

        if (table) {
          table.init();
        }
      }

      document.querySelectorAll(".tab-button").forEach(button => {
        button.addEventListener("click", () => {
          activateTab(button.dataset.tabTarget);
        });
      });

      document.querySelector("#customerNameSearch").addEventListener("input", event => {
        customerTeamTable.setSearchTerm(event.target.value);
      });

      document.querySelector("#ukServiceSearch").addEventListener("input", event => {
        ukServiceTable.setSearchTerm(event.target.value);
      });

      document.querySelector("#dokumenteSearch").addEventListener("input", event => {
        dokumenteTable.setSearchTerm(event.target.value);
      });

      document.querySelector("#vollmachtSearch").addEventListener("input", event => {
        vollmachtTable.setSearchTerm(event.target.value);
      });

      // Load first tab on page load
      activateTab("contractPanel");
    });
  </script>
</body>
</html>
